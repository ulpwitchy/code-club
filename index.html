<script>
const C={accent:'#3b82f6',green:'#10b981',red:'#ef4444',orange:'#f59e0b',purple:'#8b5cf6',pink:'#ec4899',cyan:'#06b6d4'};
const PASS=0.8;
const MODULES=[
{id:'basics',num:1,title:'The Basics',color:C.cyan,icon:'◆',lessons:[
{id:'terminal',title:'What is a Terminal?',xp:100,icon:'▸',color:C.cyan,
intro:[{t:'hero',title:'Meet the Terminal',sub:"Your computer's command center",icon:'▸_',color:C.cyan},{t:'info',title:'What you will learn',icon:'📋',color:C.cyan,body:"What a terminal is, why developers use it, where to find it, and the essential commands you need for Claude Code."}],
learn:[
{t:'expand',title:'Two ways to control your computer',items:[{label:'GUI (Graphical)',icon:'🖱',color:C.accent,preview:'Click icons, drag files',detail:"GUI = Graphical User Interface. Finder on Mac, Explorer on Windows. Visual and intuitive but slow for repetitive tasks. Every action means clicking through menus."},{label:'CLI (Terminal)',icon:'⌨️',color:C.cyan,preview:'Type commands, instant results',detail:"CLI = Command Line Interface. Type a command, hit Enter, done. Faster, more precise, and some tools ONLY work here — including Claude Code. You need about 6-8 commands to be productive."}]},
{t:'expand',title:'Why use the terminal',items:[{label:'Speed',icon:'⚡',color:C.orange,preview:'1 second vs 30 clicks',detail:"Renaming 100 files: in Finder = 10 minutes of clicking. In terminal = one command, instant. This speed compounds when building with Claude Code."},{label:'Precision',icon:'🎯',color:C.accent,preview:'Say exactly what you mean',detail:"GUIs limit you to designed buttons. Terminal lets you be exact: move all .jpg files from Downloads to Desktop/cards modified in the last 7 days — one command."},{label:'Power',icon:'🔧',color:C.purple,preview:'Access terminal-only tools',detail:"Claude Code, git, npm, and hundreds of dev tools are terminal-only. No GUI versions exist. If you want Claude Code, you need the terminal."},{label:'Automation',icon:'🤖',color:C.green,preview:'Run sequences automatically',detail:"Save commands as a script. One click: back up inventory, push to GitHub, send confirmation. The terminal enables real automation."}]},
{t:'expand',title:'Where to find it',items:[{label:'Mac',icon:'🍎',color:C.cyan,preview:'⌘+Space → type Terminal',detail:"Press ⌘+Space for Spotlight, type Terminal, hit Enter. Dark window with blinking cursor like jake@macbook ~ %. Also in Applications → Utilities. Pro tip: right-click in dock → Keep in Dock."},{label:'Windows',icon:'🪟',color:C.accent,preview:'Start → type Terminal',detail:"Click Start, type Terminal or PowerShell. Windows Terminal is the newer, nicer version. Right-click Start → Terminal for quick access."}]},
{t:'info',title:'Anatomy of the prompt',icon:'🔬',color:C.purple,body:"You see: jake@macbook ~/Desktop $ — Username (jake), computer (macbook), location (~/Desktop), $ means ready for input. The ~ is shorthand for /Users/jake (your home folder)."},
{t:'term',title:'Commands: pwd and ls',intro:'The two commands you use first:',steps:[{cmd:'pwd',out:'/Users/jake',note:'"Print Working Directory" — tells you where you are. Like asking what room you are in.'},{cmd:'ls',out:'Desktop     Documents   Downloads\nMovies      Music       Pictures',note:'"List" — shows everything in your current folder.'},{cmd:'ls -la',out:'total 48\ndrwxr-xr-x  12 jake staff  384 Mar 20 .\n-rw-r--r--   1 jake staff  120 Mar 19 .zshrc\ndrwx------  15 jake staff  480 Mar 20 Desktop',note:'"ls -la" shows everything including hidden files (starting with .), sizes, and dates. -l = long format, -a = all files.'}]},
{t:'term',title:'Commands: cd, mkdir, touch, rm',intro:'Navigate and create things:',steps:[{cmd:'cd Desktop',out:'~/Desktop $',note:'"Change Directory" — moves into Desktop folder.'},{cmd:'cd ..',out:'~ $',note:'"cd .." goes UP one level. Two dots = parent folder.'},{cmd:'cd ~/Documents',out:'~/Documents $',note:'Jump directly to any folder with its full path. ~ = home folder.'},{cmd:'mkdir my-project',out:'',note:'"Make Directory" — creates a new folder.'},{cmd:'touch index.html',out:'',note:'"Touch" — creates a new empty file.'},{cmd:'rm index.html',out:'',note:'"Remove" — PERMANENTLY deletes a file. No trash can in terminal! Be careful.'}]},
{t:'expand',title:'Keyboard shortcuts',items:[{label:'Tab',icon:'⇥',color:C.cyan,preview:'Auto-complete names',detail:'Type a few letters + Tab = auto-complete. "Des" + Tab = "Desktop/". Saves typing, prevents typos.'},{label:'Up arrow',icon:'↑',color:C.accent,preview:'Previous commands',detail:'Press up to scroll through command history. Rerun without retyping.'},{label:'Ctrl+C',icon:'⌃C',color:C.orange,preview:'Cancel current command',detail:'Universal abort. Use if something hangs or you started by mistake.'},{label:'Ctrl+L',icon:'⌃L',color:C.green,preview:'Clear screen',detail:'Same as typing "clear" but faster.'}]},
{t:'info',title:'The Claude Code workflow',icon:'📌',color:C.green,body:'Your daily flow: cd into project folder → type "claude" → start building. That is it. You will use pwd when lost, ls to check files, mkdir to create folders, cd to navigate.'}],
quiz:[{q:'What does CLI stand for?',opts:['Computer Language Interface','Command Line Interface','Code Launch Installer','Claude Learning Interface'],ans:1,fb:['Not quite','Correct! The text-based way to control your computer.','CLI is not about installation','Fun but no']},
{q:'You see ~/Desktop/burnsy-project. Where are you?',opts:['Downloads folder','burnsy-project folder on Desktop','On the internet','Home folder'],ans:1,fb:['Path shows Desktop not Downloads','Correct! ~ is home, then Desktop, then burnsy-project.','Terminal is local','You are deeper than home']},
{q:'What does ls -la show that ls does not?',opts:['Different folders','Hidden files, sizes, and dates','Deleted files','Network connections'],ans:1,fb:['Same folders, more detail','Correct! -l adds details, -a shows hidden files starting with dot.','Cannot show deleted files','ls has nothing to do with network']},
{q:'How do you go back one folder?',opts:['cd back','cd ..','cd ~','cd -1'],ans:1,fb:['Not a command','Correct! Two dots = parent directory.','Goes to home, not back one','Not a command']},
{q:'What does rm do and why be careful?',opts:['Renames files','Permanently deletes files — no trash can','Restarts machine','Removes formatting'],ans:1,fb:['That is mv','Correct! rm deletes with NO undo. No recycling bin.','rm does not restart anything','rm is not about formatting']},
{q:'Tab does what while typing?',opts:['Indents text','Auto-completes file and folder names','Opens new tab','Nothing'],ans:1,fb:['Not in terminal commands','Correct! Saves typing and prevents typos.','That is Cmd+T','Tab is very useful in terminal']},
{q:'Best two commands when you feel lost?',opts:['help and man','pwd and ls','cd and mkdir','clear and exit'],ans:1,fb:['Those give general help','Correct! pwd = where am I, ls = what is here.','Those create and move, not inform','Those clean up and quit']}]},

{id:'github',title:'What is GitHub?',xp:100,icon:'⊙',color:C.purple,
intro:[{t:'hero',title:'GitHub',sub:'Where code lives online',icon:'⊙',color:C.purple},{t:'info',title:'What you will learn',icon:'📋',color:C.purple,body:"What GitHub is, key vocabulary (repo, commit, push, pull, clone, branch), and how it fits your Claude Code workflow."}],
learn:[
{t:'expand',title:'GitHub explained',items:[{label:'Google Drive for code',icon:'📄',color:C.accent,preview:'Cloud storage with version tracking',detail:"Like Google Drive but tracks EVERY change ever made. Go back to any version, see who changed what. Infinite undo with complete history."},{label:'Why it exists',icon:'🌍',color:C.purple,preview:'Backup and collaboration',detail:"Back up code (survives laptop failure), collaborate without overwriting, track changes, share publicly. 100M+ developers use it."},{label:'Free for you',icon:'💰',color:C.green,preview:'Unlimited repos, no cost',detail:"Free: unlimited public and private repos. No credit card needed."}]},
{t:'vocab',title:'Core vocabulary',terms:[{term:'Repository (repo)',def:'Project folder on GitHub with all files and change history.',ex:'burnsy-website, card-tracker',color:C.purple},{term:'Commit',def:'Snapshot of your code with a message. Like a save point you can return to.',ex:'"Added eBay link", "Fixed mobile bug"',color:C.accent},{term:'Push',def:'Upload local commits to GitHub. Until you push, changes are only on your computer.',ex:'git push origin main',color:C.green},{term:'Pull',def:'Download latest changes from GitHub. Opposite of push.',ex:'git pull',color:C.orange},{term:'Clone',def:'Download entire project from GitHub for the first time.',ex:'git clone https://github.com/user/repo',color:C.pink},{term:'Branch',def:'Parallel version of code. Experiment without affecting main version.',ex:'main, feature/new-page, fix/broken-button',color:C.cyan}]},
{t:'info',title:'GitHub + Claude Code',icon:'🔗',color:C.green,body:"Workflow: build with Claude Code → commit → push to GitHub → Vercel auto-deploys. GitHub is the bridge between your computer and the live internet."},
{t:'expand',title:'Why this matters for Burnsy',items:[{label:'Code insurance',icon:'🛡',color:C.green,preview:'Laptop dies? Code is safe.',detail:"Without GitHub = code only on your computer. Laptop breaks = everything gone. With GitHub = clone repo on new laptop, back to work in 5 minutes."},{label:'Hiring developers',icon:'👥',color:C.accent,preview:'They start working immediately',detail:"Developer clones your repo = has entire project instantly. No emailing zip files."},{label:'Portfolio',icon:'📁',color:C.purple,preview:'Show what you have built',detail:"GitHub profile = tech portfolio. Shows you can build things, even if Claude wrote the code."}]}],
quiz:[{q:'Main advantage of GitHub over Google Drive for code?',opts:['Faster','Tracks every change with full version history','Works offline','More storage'],ans:1,fb:['Speed is not the difference','Correct! Full version history with ability to go back to any point.','Both work offline somewhat','Storage is not the key']},
{q:'Commit vs push?',opts:['Same thing','Commit saves locally, push uploads to GitHub','Commit is bigger','Push saves locally'],ans:1,fb:['Two separate steps','Correct! Commit = local save. Push = upload to cloud.','Size is irrelevant','That is backwards']},
{q:'What is a branch?',opts:['Internet connection','Parallel version for safe changes','Deleting old code','Downloading a project'],ans:1,fb:['Not related','Correct! Experiment without affecting the main version.','Branches prevent deletion','That is clone']},
{q:'Laptop stolen. Is your code safe?',opts:['No','Yes if you pushed to GitHub','Yes if encrypted','Yes if using Claude Code'],ans:1,fb:['Only if you never pushed','Correct! Pushed code is safely on GitHub servers.','Encryption protects the thief from reading it','Claude Code does not back up code']},
{q:'First time downloading a project from GitHub?',opts:['git pull','git push','git clone','git download'],ans:2,fb:['Pull updates existing','Push uploads','Correct! Clone downloads a complete copy with history.','Not a real command']}]},

{id:'node',title:'What is Node.js?',xp:75,icon:'◈',color:C.green,
intro:[{t:'hero',title:'Node.js',sub:'The engine Claude Code runs on',icon:'◈',color:C.green},{t:'info',title:'What you will learn',icon:'📋',color:C.green,body:"What Node.js is, why Claude Code needs it, how to install it, and what npm is. Install once, forget forever."}],
learn:[
{t:'expand',title:'The car analogy',items:[{label:'Claude Code = Car',icon:'🚗',color:C.accent,preview:'The tool you drive',detail:"Claude Code is what you interact with. Type prompts, see results. The steering wheel and dashboard."},{label:'Node.js = Engine',icon:'⚙️',color:C.green,preview:'Makes the car run silently',detail:"Install once, never interact with directly. Without it, Claude Code cannot start. Just needs to exist."}]},
{t:'info',title:'Technical truth',icon:'🧠',color:C.purple,body:"JavaScript normally runs in browsers (Safari, Chrome). Node.js lets JavaScript run on your computer directly. Claude Code is built with JavaScript, so it needs Node.js as its runtime."},
{t:'expand',title:'npm explained',items:[{label:'What is npm',icon:'📦',color:C.orange,preview:'Installs developer tools',detail:"npm = Node Package Manager. Comes free with Node. Downloads and installs tools like Claude Code. Think App Store for dev tools, in the terminal."},{label:'The -g flag',icon:'🌐',color:C.accent,preview:'Install globally',detail:"Without -g: tool only works in one folder. With -g: works everywhere. Always use -g for tools like Claude Code."}]},
{t:'term',title:'Installing Node.js',intro:'Complete process:',steps:[{cmd:'node --version',out:'command not found: node',note:'"command not found" = not installed. Expected on new computer.'},{cmd:'brew install node',out:'==> Downloading node-22.0.0\n==> Installing node\n🍺 node installed!',note:'Homebrew installs Node on Mac. Windows: download from nodejs.org.'},{cmd:'node --version',out:'v22.0.0',note:'Version number = installed. Done forever. ✅'},{cmd:'npm --version',out:'10.2.0',note:'npm came with Node automatically. You will use npm once — to install Claude Code.'}]}],
quiz:[{q:'Relationship between Node.js and Claude Code?',opts:['Same thing','Node.js is the runtime engine Claude Code needs','Claude Code installs Node','Node is newer Claude Code'],ans:1,fb:['Separate tools','Correct! Node.js is the engine underneath.','You install Node first','Completely different tools']},
{q:'What does npm do?',opts:['Runs websites','Downloads and installs developer tools','Connects to GitHub','Edits code'],ans:1,fb:['That is a web server','Correct! Package manager that installs tools like Claude Code.','GitHub has its own tools','npm installs, does not edit']},
{q:'Why use -g flag?',opts:['Faster','Installs globally for any folder','Gaming version','Required by Apple'],ans:1,fb:['Not about speed','Correct! Without -g it only works in one folder.','g = global','Apple is not involved']},
{q:'"command not found: node" — what to do?',opts:['Restart computer','Install Node.js','Update terminal','Call support'],ans:1,fb:['Will not install missing software','Correct! It is not there — install it.','Terminal is fine','DIY with brew install node']}]}
]},

{id:'code',num:2,title:'Claude Code',color:C.accent,icon:'⬡',lessons:[
{id:'install-cc',title:'Installing Claude Code',xp:100,icon:'↓',color:C.accent,
intro:[{t:'hero',title:'Installation',sub:'Zero to first prompt',icon:'↓',color:C.accent},{t:'info',title:'What you will learn',icon:'📋',color:C.accent,body:"Installing Claude Code, first launch vs subsequent launches, understanding the interface, and subscription requirements."}],
learn:[
{t:'expand',title:'Prerequisites',items:[{label:'Node.js',icon:'✅',color:C.green,preview:'node --version should show a number',detail:'If "command not found" go back and install Node first.'},{label:'Subscription',icon:'✅',color:C.accent,preview:'Pro $20/mo, Max $100/mo, or API key',detail:'Pro gives monthly usage allowance. Max = 5x usage. API key = pay-as-you-go.'},{label:'Terminal open',icon:'✅',color:C.cyan,preview:'Ready for commands',detail:'Open Terminal (Mac) or PowerShell (Windows).'}]},
{t:'term',title:'Complete installation',intro:'Install, launch, login:',steps:[{cmd:'npm install -g @anthropic-ai/claude-code',out:'added 1 package in 14s\n+ @anthropic-ai/claude-code@1.0.0',note:'Downloads Claude Code from npm registry. -g = use from any folder. Takes 10-30 seconds.'},{cmd:'claude',out:'╔════════════════════════════════════╗\n║    Welcome to Claude Code! 🎉     ║\n║    Opening browser to log in...    ║\n╚════════════════════════════════════╝',note:'First launch opens browser for login. ONE-TIME step.'},{cmd:'claude',out:'Claude Code v1.0\n  ✦ Model: Claude Sonnet 4.6\n  ✦ Context: ~/Desktop/my-project\n  ✦ Cost: $0.00\n\n  What can I help you build?\n  > _',note:'After login, this is every launch. Model, folder, cost tracker, and cursor waiting for English.'}]},
{t:'expand',title:'The interface',items:[{label:'Model name',icon:'🧠',color:C.purple,preview:'Which AI is running',detail:'Shows Sonnet or Opus. Sonnet = fast/cheap. Opus = smarter. Switch with /model.'},{label:'Context path',icon:'📂',color:C.accent,preview:'Which folder Claude sees',detail:'Claude reads ALL files here. Always cd into your project BEFORE launching claude.'},{label:'Session cost',icon:'💲',color:C.green,preview:'Real-time spending',detail:'Tracks API usage. /cost for breakdown. Typical session: $0.50-$2.'}]},
{t:'info',title:'Always cd first!',icon:'💡',color:C.orange,body:"#1 beginner mistake: launching from wrong folder. Always navigate to your project first. If you are in home folder, Claude sees ALL your files which is slow and confusing."}],
quiz:[{q:'First time running "claude"?',opts:['Starts building','Opens browser for login','Installs Node','Creates project'],ans:1,fb:['First time needs auth','Correct! One-time browser login. After that, instant.','Node should be pre-installed','You create projects with mkdir']},
{q:'Why cd into project first?',opts:['Does not matter','So Claude sees only project files','claude only works in home','Speed'],ans:1,fb:['It matters a lot','Correct! Right folder = right context.','Works anywhere','Context is the issue not speed']},
{q:'Session cost $0.42 means?',opts:['You owe $0.42','Used $0.42 of API usage this session','Subscription is $0.42','$0.42 per message'],ans:1,fb:['Tracked against plan','Correct! Cumulative session usage.','Subscription is $20/mo','Varies by message']},
{q:'Install command?',opts:['brew install claude','npm install -g @anthropic-ai/claude-code','pip install claude','apt install claude'],ans:1,fb:['brew is for other tools','Correct!','pip is Python','apt is Linux']}]},

{id:'session',title:'Your First Real Session',xp:120,icon:'◉',color:C.pink,
intro:[{t:'hero',title:'Building Real Things',sub:'From English to working website',icon:'◉',color:C.pink},{t:'info',title:'What you will learn',icon:'📋',color:C.pink,body:"Writing effective prompts, the permission system, slash commands, CLAUDE.md config, and a complete build session from start to finish."}],
learn:[
{t:'expand',title:'Claude Code vs Claude.ai',items:[{label:'Claude.ai (browser)',icon:'💬',color:C.accent,preview:'Text in, text out',detail:"This chat gives you code as text. You copy, create files, paste. Claude cannot touch your actual files."},{label:'Claude Code (terminal)',icon:'🛠',color:C.pink,preview:'Text in, files changed',detail:"Runs on your computer with file access. Creates, edits, deletes files. Runs commands. You describe → it builds → you approve."}]},
{t:'term',title:'Full build: Burnsy landing page',intro:'Watch a complete session:',steps:[{cmd:'cd ~/Desktop && mkdir burnsy-site && cd burnsy-site',out:'~/Desktop/burnsy-site $',note:'Create and enter project folder.'},{cmd:'claude',out:'Claude Code v1.0\n  ✦ Context: ~/Desktop/burnsy-site\n  > _',note:'Launch in project folder.'},{cmd:'Build a professional landing page for Burnsy Enterprises, my sports card business. Dark theme, hero section with brand name, featured cards grid, about section, eBay and TikTok links, contact section. Mobile responsive, smooth scroll animations.',out:'Planning:\n  1. index.html — structure\n  2. styles.css — dark theme\n  3. script.js — animations\n\n📁 Create index.html?\n  [Y] Yes [N] No',note:'Detailed prompt = clear plan. Claude asks permission per file.'},{cmd:'y',out:'✅ Created index.html (87 lines)\n✅ Created styles.css (142 lines)\n✅ Created script.js (38 lines)\n\n✨ Landing page complete!\n\nOpen in browser?',note:'Full website from one prompt. ~45 seconds. 🔥'},{cmd:'y',out:'Opening in Safari...\n\nWhat would you like to change?',note:'Your site is live. Keep chatting: "make hero bigger", "add testimonials", etc.'}]},
{t:'vocab',title:'Slash commands',terms:[{term:'/clear',def:'Wipe conversation. Use between tasks.',ex:'After website → /clear → new task',color:C.cyan},{term:'/cost',def:'Detailed cost breakdown.',ex:'Input: $0.28 | Output: $0.14 | Total: $0.42',color:C.green},{term:'/compact',def:'Compress history to save space.',ex:'Long session → /compact → keeps working',color:C.orange},{term:'/model',def:'Switch AI model mid-session.',ex:'/model opus for complex tasks',color:C.purple},{term:'/help',def:'Show all commands and shortcuts.',ex:'Forgot a command? /help',color:C.accent}]},
{t:'expand',title:'Writing effective prompts',items:[{label:'Be specific',icon:'🎯',color:C.accent,preview:'Details = better results',detail:'BAD: "Build a website." GOOD: "Build a landing page with dark theme, hero section, 3-column card grid, about section, contact form. Mobile responsive." More detail = fewer revisions.'},{label:'Include context',icon:'📝',color:C.green,preview:'Tell Claude about your business',detail:'"I run a sports card business on eBay and TikTok" gives Claude context for smart decisions.'},{label:'Iterate',icon:'🔄',color:C.orange,preview:'Keep refining',detail:'After first build, keep going: "Make hero taller", "Change accent to gold", "Add testimonials". Each builds on previous.'},{label:'Ask why',icon:'❓',color:C.purple,preview:'Learn as you go',detail:'"What did you just do?" or "Why that approach?" Claude explains in plain English.'}]},
{t:'expand',title:'CLAUDE.md config',items:[{label:'What it is',icon:'📄',color:C.accent,preview:'File Claude reads every session',detail:'Put in project root. Claude reads it before you say anything. Like a briefing before work.'},{label:'What to put',icon:'✏️',color:C.green,preview:'Preferences and context',detail:'# Burnsy Enterprises\nSports card business.\n## Preferences\n- Dark themes\n- Simple code\n- Mobile-first\n- Vanilla JavaScript'},{label:'Why it matters',icon:'⚡',color:C.orange,preview:'Consistency without repeating yourself',detail:'Without it you repeat preferences every session. With it Claude knows automatically.'}]}],
quiz:[{q:'Biggest difference: Claude.ai vs Claude Code?',opts:['Claude Code is newer','Claude Code directly creates and edits files','Different AI model','Requires internet'],ans:1,fb:['Age is not it','Correct! File system access = creates, edits, deletes, runs commands.','Same models available','Both need internet']},
{q:'How to improve "build me a website"?',opts:['Add please','Add specific details: sections, theme, features','Make shorter','Write in code'],ans:1,fb:['Politeness does not improve output','Correct! Specifics like dark theme, hero section, grid, responsive give clear direction.','Shorter = worse','English works better']},
{q:'When to /clear?',opts:['After every message','When switching tasks','When Claude makes mistake','Every morning'],ans:1,fb:['Erases useful context','Correct! Prevents old context confusing new tasks.','Just correct the mistake','Frequency irrelevant']},

const FLAT=MODULES.flatMap(m=>m.lessons.map(l=>({...l,modId:m.id,modNum:m.num,modTitle:m.title,modColor:m.color})));

function chkAch(){let n=[];ACHS.forEach(a=>{if(!S.ach.includes(a.id)&&a.ck()){S.ach.push(a.id);n.push(a);}});if(n.length)save();return n;}

let h=`<div class="scroll" style="padding-bottom:90px"><div style="padding:20px;padding-top:max(48px,calc(env(safe-area-inset-top)+16px));background:linear-gradient(180deg,rgba(59,130,246,0.05)0%,transparent 100%)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px"><div><div style="font-size:11px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);margin-bottom:6px">Code Club</div><h1 style="font-size:26px;font-weight:800;letter-spacing:-0.02em">Learn Claude Code</h1></div><div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);border-radius:20px"><span style="font-size:14px">🔥</span><span style="font-size:13px;font-weight:700;color:var(--orange);font-family:var(--mono)">${S.streak}</span></div></div>
<div style="padding:14px;background:var(--card);border:1px solid var(--border);border-radius:14px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;color:var(--muted)">Progress</span><span style="font-size:13px;font-weight:700;color:var(--accent);font-family:var(--mono)">${S.xp}/${tXp} XP</span></div><div style="height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden"><div style="height:100%;border-radius:3px;width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .6s"></div></div><div style="font-size:12px;color:var(--dim);margin-top:6px;font-family:var(--mono)">${S.done.size}/${FLAT.length} lessons</div></div></div>

m.lessons.forEach(l=>{const d=S.done.has(l.id);h+=`<button onclick="openL('${l.id}')" style="display:flex;align-items:center;gap:14px;padding:14px 16px;width:100%;border-radius:14px;text-align:left;border:1px solid ${d?'rgba(16,185,129,0.12)':'var(--border)'};background:${d?'rgba(16,185,129,0.04)':'var(--card)'};margin-bottom:8px"><div style="width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:${d?16:18}px;font-family:var(--mono);font-weight:700;color:${d?'var(--green)':l.color};background:${d?'rgba(16,185,129,0.12)':l.color+'12'};border:1px solid ${d?'rgba(16,185,129,0.25)':l.color+'25'};flex-shrink:0">${d?'✓':l.icon}</div><div style="flex:1"><div style="font-size:15px;font-weight:600;margin-bottom:2px">${l.title}</div><div style="font-size:12px;color:var(--dim)"><span style="font-family:var(--mono)">+${l.xp}XP</span> · Intro → Learn → Quiz</div></div><div style="color:var(--dim);font-size:16px">›</div></button>`;});h+=`</div>`;});

let qT=0,allA=false,passed=false,qS=0;if(isQ){qT=l.quiz.length;allA=Object.keys(S.qa).length>=qT;if(allA){qS=l.quiz.reduce((sc,q,i)=>sc+(S.qa[i]===q.ans?1:0),0);passed=qS/qT>=PASS;}}

h+=`<div style="display:flex;gap:3px;padding:8px 16px;flex-shrink:0">${sl.map((_,i)=>`<div style="height:3px;flex:1;border-radius:2px;background:${i<=S.si?l.color:'rgba(255,255,255,0.05)'};opacity:${i<=S.si?1:0.3};transition:all .4s"></div>`).join('')}</div>`;
const title=isQ?`Question ${S.si+1} of ${qT}`:s.title;if(s.t!=='hero')h+=`<div style="padding:16px 20px 4px;flex-shrink:0"><h2 style="font-size:20px;font-weight:700">${title}</h2></div>`;
h+=`<div class="scroll" style="padding:${s.t==='hero'?'0':'8px 20px'} ${s.t==='hero'?'0':'140px'}">${isQ?qHTML(l.quiz[S.si],S.si):sHTML(s,l.color)}</div>`;

if(S.si>0)h+=`<button onclick="S.si--;render();setTimeout(initI,60)" style="width:48px;height:48px;border-radius:14px;border:1px solid var(--border);background:var(--glass);color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0">‹</button>`;

function qHTML(q,idx){const sel=S.qa[idx],ans=sel!==undefined;

let h=`<div class="scroll" style="padding-bottom:90px"><div style="padding:24px 20px;padding-top:max(48px,calc(env(safe-area-inset-top)+20px));text-align:center"><div style="width:80px;height:80px;border-radius:24px;margin:0 auto 16px;background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(139,92,246,0.15));border:2px solid rgba(59,130,246,0.3);display:flex;align-items:center;justify-content:center;font-size:36px">🧑‍💻</div><h1 style="font-size:24px;font-weight:800">Jake</h1><p style="font-size:14px;color:var(--muted)">Code Club</p></div>
<div style="padding:0 20px"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px">${[{l:'Level',v:lv,c:C.accent},{l:'XP',v:S.xp,c:C.green},{l:'Streak',v:S.streak+'🔥',c:C.orange}].map(s=>`<div style="padding:16px 10px;border-radius:14px;text-align:center;background:${s.c}06;border:1px solid ${s.c}12"><div style="font-size:22px;font-weight:800;font-family:var(--mono);color:${s.c}">${s.v}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${s.l}</div></div>`).join('')}</div>
<div style="padding:16px;background:var(--glass);border:1px solid var(--border);border-radius:14px;margin-bottom:28px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;color:var(--muted)">Lv ${lv}</span><span style="font-size:13px;color:var(--muted)">Lv ${lv+1}</span></div><div style="height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden"><div style="height:100%;border-radius:3px;width:${(lp/150)*100}%;background:linear-gradient(90deg,var(--accent),var(--cyan))"></div></div><div style="font-size:12px;color:var(--dim);margin-top:6px;text-align:center;font-family:var(--mono)">${150-lp} XP to next</div></div>
<h3 style="font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;font-family:var(--mono)">Achievements</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:28px">`;
ACHS.forEach(a=>{const u=S.ach.includes(a.id);h+=`<div style="padding:14px;border-radius:14px;text-align:center;background:${u?'rgba(16,185,129,0.05)':'var(--glass)'};border:1px solid ${u?'rgba(16,185,129,0.15)':'var(--border)'};opacity:${u?1:0.4}"><div style="font-size:24px;margin-bottom:6px;${u?'':'filter:grayscale(1)'}">${a.icon}</div><div style="font-size:13px;font-weight:700;margin-bottom:2px">${a.title}</div><div style="font-size:11px;color:var(--dim)">${a.desc}</div></div>`;});
h+=`</div><h3 style="font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;font-family:var(--mono)">Lessons (${S.done.size}/${FLAT.length})</h3>`;
FLAT.forEach(l=>{const d=S.done.has(l.id);h+=`<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:${d?'rgba(16,185,129,0.05)':'var(--glass)'};border:1px solid ${d?'rgba(16,185,129,0.12)':'var(--border)'};border-radius:12px;margin-bottom:8px;opacity:${d?1:0.35}"><div style="width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:var(--mono);font-weight:700;color:${d?'var(--green)':'var(--dim)'};background:${d?'rgba(16,185,129,0.12)':'rgba(255,255,255,0.04)'}">${d?'✓':l.icon}</div><div><div style="font-size:14px;font-weight:600">${l.title}</div><div style="font-size:11px;color:var(--dim);font-family:var(--mono)">+${l.xp} XP</div></div></div>`;});
h+=`<button onclick="if(confirm('Reset all progress?')){S.done=new Set();S.xp=0;S.ach=[];save();go('profile')}" style="width:100%;margin-top:20px;padding:14px;border-radius:12px;border:1px solid rgba(239,68,68,0.2);background:rgba(239,68,68,0.05);color:var(--red);font-size:14px;font-weight:600">Reset Progress</button></div></div>${nav('profile')}`;app.innerHTML=h;}

function rPl(){let h=`<div class="scroll" style="padding-bottom:90px"><div style="padding:20px;padding-top:max(48px,calc(env(safe-area-inset-top)+16px))"><h1 style="font-size:24px;font-weight:800;margin-bottom:4px">Playground</h1><p style="font-size:14px;color:var(--muted);margin-bottom:24px">Practice terminal commands</p>
<div style="background:#0a0e17;border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:24px"><div style="display:flex;align-items:center;gap:6px;padding:10px 14px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border)"><div style="width:8px;height:8px;border-radius:50%;background:#ff5f57"></div><div style="width:8px;height:8px;border-radius:50%;background:#febc2e"></div><div style="width:8px;height:8px;border-radius:50%;background:#28c840"></div><span style="margin-left:8px;font-size:11px;color:var(--dim);font-family:var(--mono)">sandbox</span></div><div id="sout" style="padding:14px;font-family:var(--mono);font-size:12px;line-height:1.7;color:#8b949e;min-height:140px;max-height:280px;overflow-y:auto"><div><span style="color:var(--green)">~ $</span> <span style="color:var(--dim)">type a command below</span></div></div><div style="display:flex;border-top:1px solid var(--border)"><span style="padding:12px 0 12px 14px;color:var(--green);font-family:var(--mono);font-size:12px">❯</span><input id="sin" type="text" placeholder="try: pwd, ls, cd, mkdir, help" autocapitalize="off" autocomplete="off" spellcheck="false" style="flex:1;padding:12px 14px;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:13px"></div></div>
<h3 style="font-size:13px;font-weight:700;color:var(--orange);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;font-family:var(--mono)">Quick Reference</h3><div style="display:flex;flex-direction:column;gap:6px">${[{c:'pwd',d:'Where am I?',cl:C.cyan},{c:'ls / ls -la',d:'List files',cl:C.accent},{c:'cd [folder]',d:'Enter folder',cl:C.green},{c:'cd ..',d:'Go back',cl:C.green},{c:'mkdir [name]',d:'Create folder',cl:C.orange},{c:'touch [name]',d:'Create file',cl:C.purple},{c:'rm [file]',d:'Delete (permanent!)',cl:C.red},{c:'clear',d:'Clear screen',cl:C.pink},{c:'claude',d:'Launch Claude Code',cl:C.accent}].map(x=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:${x.cl}06;border:1px solid ${x.cl}12;border-radius:10px"><code style="font-family:var(--mono);font-size:12px;font-weight:700;color:${x.cl};min-width:100px">${x.c}</code><span style="font-size:13px">${x.d}</span></div>`).join('')}</div></div></div>${nav('playground')}`;app.innerHTML=h;initSB();}

function nav(a){return`<div style="position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(6,8,13,0.95);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding-bottom:max(8px,env(safe-area-inset-bottom))"><div style="display:flex;justify-content:space-around;padding:8px 0">${[{id:'home',ic:'◆',lb:'Learn'},{id:'playground',ic:'▸_',lb:'Practice'},{id:'profile',ic:'◎',lb:'Profile'}].map(t=>`<button onclick="go('${t.id}')" style="display:flex;flex-direction:column;align-items:center;gap:2px;color:${a===t.id?'var(--accent)':'var(--dim)'};font-size:10px;font-weight:600;position:relative;padding:4px 16px">${a===t.id?'<div style="position:absolute;top:-4px;width:20px;height:3px;background:var(--accent);border-radius:2px"></div>':''}<span style="font-size:18px;font-family:var(--mono)">${t.ic}</span><span>${t.lb}</span></button>`).join('')}</div></div>`;}

window.openL=function(id){S.lesson=FLAT.find(x=>x.id===id);S.phase='intro';S.si=0;S.qa={};S.view='lesson';render();setTimeout(initI,60);};
window.passQ=function(){if(S.lesson&&!S.done.has(S.lesson.id)){S.done.add(S.lesson.id);S.xp+=S.lesson.xp;save();const n=chkAch();if(n.length){const t=document.createElement('div');t.style.cssText='position:fixed;top:60px;left:20px;right:20px;z-index:999;padding:16px;border-radius:14px;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);text-align:center;animation:fadeUp .4s;font-family:Outfit,sans-serif';t.innerHTML=`<div style="font-size:24px;margin-bottom:4px">${n[0].icon}</div><div style="font-size:14px;font-weight:700;color:var(--green)">Achievement Unlocked!</div><div style="font-size:13px;color:var(--muted)">${n[0].title}</div>`;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}}go('home');};
window.retryQ=function(){S.qa={};S.si=0;render();setTimeout(initI,60);};

function initI(){
document.querySelectorAll('.xcard').forEach(c=>{if(c._i)return;c._i=1;const tr=c.querySelector('.xtrig'),bd=c.querySelector('.xbody'),ar=c.querySelector('.xarr');let o=0;tr.onclick=()=>{o=!o;bd.style.maxHeight=o?bd.scrollHeight+'px':'0';ar.style.transform=o?'rotate(180deg)':'';};});
document.querySelectorAll('.tw').forEach(el=>{if(el._i)return;el._i=1;const steps=JSON.parse(el.dataset.steps);let idx=-1,typed='',so=false,tm=null;
function dr(){let h=`<div style="background:#0a0e17;border-radius:14px;border:1px solid var(--border);overflow:hidden;cursor:pointer;user-select:none"><div style="display:flex;align-items:center;gap:6px;padding:10px 14px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border)"><div style="width:8px;height:8px;border-radius:50%;background:#ff5f57"></div><div style="width:8px;height:8px;border-radius:50%;background:#febc2e"></div><div style="width:8px;height:8px;border-radius:50%;background:#28c840"></div><span style="margin-left:8px;font-size:11px;color:var(--dim);font-family:var(--mono)">terminal</span></div><div style="padding:14px;font-family:var(--mono);font-size:12px;line-height:1.7;color:#8b949e;min-height:80px">`;
if(idx===-1)h+=`<div style="text-align:center;padding:20px 0;color:var(--dim)"><div style="font-size:20px;margin-bottom:6px;animation:float 2s ease-in-out infinite">👆</div><div style="font-size:12px">Tap to start</div></div>`;
else{for(let i=0;i<=idx;i++){const s=steps[i];if(s.cmd)h+=`<div><span style="color:var(--green)">❯ </span><span style="color:var(--text)">${i<idx?s.cmd:typed}</span>${i===idx&&!so?'<span style="animation:blink 1s infinite;color:var(--accent)">▋</span>':''}</div>`;if((i<idx||so)&&s.out)h+=`<div style="white-space:pre-wrap;color:#7d8da0;margin-top:2px">${s.out}</div>`;if(i<idx)h+=`<div style="height:6px"></div>`;}}
h+=`</div></div>`;if(so&&idx>=0)h+=`<div style="margin-top:10px;padding:14px;border-radius:12px;font-size:13.5px;line-height:1.6;color:var(--text);animation:fadeUp .3s;background:rgba(59,130,246,0.06);border-left:3px solid var(--accent);font-family:Outfit,sans-serif">${steps[idx].note}</div>`;
if(idx>=0)h+=`<div style="text-align:center;margin-top:8px;font-size:11px;color:var(--dim)">${idx<steps.length-1?idx+1+'/'+steps.length+' — tap':'tap to restart'}</div>`;el.innerHTML=h;}
function rn(i){if(tm)clearInterval(tm);idx=i;typed='';so=false;dr();const s=steps[i];if(!s.cmd){so=true;dr();return;}let c=0;tm=setInterval(()=>{c++;typed=s.cmd.slice(0,c);dr();if(c>=s.cmd.length){clearInterval(tm);setTimeout(()=>{so=true;dr();},250);}},20);}
el.onclick=()=>{if(idx<steps.length-1)rn(idx+1);else{idx=-1;typed='';so=false;dr();}};dr();});
document.querySelectorAll('.qo').forEach(b=>{if(b._i)return;b._i=1;b.onclick=()=>{const i=parseInt(b.dataset.i),qi=parseInt(b.dataset.qi);if(S.qa[qi]!==undefined)return;S.qa[qi]=i;render();setTimeout(initI,60);};});}

function initSB(){const inp=document.getElementById('sin'),out=document.getElementById('sout');if(!inp)return;let cwd='/Users/jake';const fs={'/Users/jake':['Desktop','Documents','Downloads'],'/Users/jake/Desktop':['burnsy-project','notes.txt'],'/Users/jake/Documents':['resume.pdf'],'/Users/jake/Downloads':['card-photo.jpg'],'/Users/jake/Desktop/burnsy-project':['index.html','styles.css']};const add=h=>{out.innerHTML+=h;out.scrollTop=out.scrollHeight;};const pr=()=>`<span style="color:var(--green)">~${cwd.replace('/Users/jake','~')} $</span>`;
inp.onkeydown=e=>{if(e.key!=='Enter')return;const v=inp.value.trim();inp.value='';if(!v)return;add(`<div>${pr()} <span style="color:var(--text)">${v}</span></div>`);const p=v.split(' '),c=p[0],a=p.slice(1).join(' ');
if(c==='pwd')add(`<div>${cwd}</div>`);else if(c==='ls')add(`<div style="white-space:pre-wrap">${(fs[cwd]||[]).join('  ')||'(empty)'}</div>`);else if(c==='cd'){if(!a||a==='~')cwd='/Users/jake';else if(a==='..')cwd=cwd.split('/').slice(0,-1).join('/')||'/';else{const np=cwd+'/'+a;if(fs[np]!==undefined)cwd=np;else add(`<div style="color:var(--red)">cd: not found: ${a}</div>`);}}else if(c==='mkdir'){if(!a)add(`<div style="color:var(--red)">usage: mkdir name</div>`);else{if(!fs[cwd])fs[cwd]=[];fs[cwd].push(a);fs[cwd+'/'+a]=[];add(`<div style="color:var(--green)">✓ Created: ${a}</div>`);}}else if(c==='touch'){if(!a)add(`<div style="color:var(--red)">usage: touch name</div>`);else{if(!fs[cwd])fs[cwd]=[];fs[cwd].push(a);add(`<div style="color:var(--green)">✓ Created: ${a}</div>`);}}else if(c==='rm'){if(!a)add(`<div style="color:var(--red)">usage: rm file</div>`);else{const f=fs[cwd];if(f){const i=f.indexOf(a);if(i>-1){f.splice(i,1);add(`<div style="color:var(--orange)">⚠ Deleted: ${a}</div>`);}else add(`<div style="color:var(--red)">not found: ${a}</div>`);}}}else if(c==='clear')out.innerHTML='';else if(c==='help')add(`<div style="color:var(--cyan)">Commands: pwd ls cd mkdir touch rm clear claude help</div>`);else if(c==='claude')add(`<div style="color:var(--accent)">Claude Code (sandbox mode)\n<span style="color:var(--muted)">Install the real one to build!</span></div>`);else add(`<div style="color:var(--red)">not found: ${c}</div>`);add(`<div>${pr()}</div>`);};
}
setTimeout(()=>{document.getElementById('splash').style.display='none';go('home');},2400);
</script></body></html>
